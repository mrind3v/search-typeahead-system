services:
  redis-1:
    image: redis:7-alpine
    container_name: typeahead-redis-1
    ports:
      - "6379:6379"
    volumes:
      - redis-1-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-2:
    image: redis:7-alpine
    container_name: typeahead-redis-2
    ports:
      - "6380:6379"
    volumes:
      - redis-2-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-3:
    image: redis:7-alpine
    container_name: typeahead-redis-3
    ports:
      - "6381:6379"
    volumes:
      - redis-3-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-4:
    image: redis:7-alpine
    container_name: typeahead-redis-4
    ports:
      - "6382:6379"
    volumes:
      - redis-4-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: typeahead-app
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    environment:
      DATABASE_PATH: /app/data/queries.db
      SEED_MIN_ROWS: "200000"
      REDIS_1_HOST: redis-1
      REDIS_1_PORT: "6379"
      REDIS_2_HOST: redis-2
      REDIS_2_PORT: "6379"
      REDIS_3_HOST: redis-3
      REDIS_3_PORT: "6379"
      REDIS_4_HOST: redis-4
      REDIS_4_PORT: "6379"
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy

volumes:
  redis-1-data:
  redis-2-data:
  redis-3-data:
  redis-4-data:
  app-data:
